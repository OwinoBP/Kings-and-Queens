<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <style>
    :root {
      --primary-deep: #121212;
      --primary-base: #1c1c1c;
      --accent-base: #c5a059;
      --accent-light: #e3c994;
      --cream: #fdf7f2;
      --charcoal: #1d1d1d;
      --surface: #fffaf5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(
          circle at top left,
          rgba(227, 201, 148, 0.4),
          transparent 40%
        ),
        radial-gradient(
          circle at bottom right,
          rgba(28, 28, 28, 0.04),
          transparent 35%
        ),
        linear-gradient(135deg, #ffffff 0%, var(--surface) 50%, var(--cream) 100%);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    /* Site Header matching your frosted glass style */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(253, 247, 242, 0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(28, 28, 28, 0.08);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Your exact logo sizes scaled up */
    .logo {
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }

    .logo-mark {
      width: 252px;
      height: 168px;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* Main Content Area */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .maintenance-container {
      max-width: 600px;
      padding: 3rem 2rem;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(227, 201, 148, 0.3);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(140, 109, 49, 0.05);
    }

    /* Elegant Pulse Animation for Status */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(197, 160, 89, 0.1);
      color: var(--primary-base);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      border: 1px solid rgba(197, 160, 89, 0.3);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-base);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary-deep);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 2.5rem;
    }

    /* Luxury Gold Button Accent */
    .notify-btn {
      display: inline-block;
      background: var(--primary-base);
      color: #ffffff;
      padding: 12px 32px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .notify-btn:hover {
      background: transparent;
      color: var(--primary-base);
      border-color: var(--primary-base);
      transform: translateY(-2px);
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(197, 160, 89, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .logo-mark { width: 180px; height: 120px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="logo">
      <!-- Replace 'logo.png' with your actual path -->
      <img src="logo.png" alt="Company Logo" class="logo-mark">
    </div>
  </header>

  <main>
    <div class="maintenance-container">
      <div class="status-badge">
        <span class="status-dot"></span>
        Upgrading Experience
      </div>
      <h1>Enhancing Our Space</h1>
      <p>We are currently polishing our digital storefront to bring you a more refined luxury experience. We will return shortly.</p>
      <a href="mailto:info@yourdomain.com" class="notify-btn">Contact Support</a>
    </div>
  </main>

</body>
</html>
